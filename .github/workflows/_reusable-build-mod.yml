# Reusable workflow: Mod JAR Assembly
#
# Downloads all previously compiled native binaries, assembles the mod JARs
# for all enabled loaders of the given Minecraft version via Gradle, and
# uploads them as a versioned artifact.
#
# Which loaders are built is fully dynamic: it is determined by the
# enabled_platforms property in the version's gradle.properties, so adding
# a new Stonecutter target requires no changes here.
#
# Inputs:
#   mc_version:              Minecraft version to build.
#   natives-artifact-prefix: Prefix of the native library artifacts to download.
#   retention-days:          How long to retain the assembled JAR artifact.

name: "Reusable - Build Mod"

on:
  workflow_call:
    inputs:
      mc_version:
        description: "Minecraft version target."
        type: string
        required: true
      natives-artifact-prefix:
        description: "Prefix of the native library artifacts to download."
        type: string
        required: true
      retention-days:
        description: "Artifact retention period in days."
        type: number
        default: 7
    outputs:
      artifact-name:
        description: "Name of the artifact containing the assembled mod JARs."
        value: "velthoric-jars-${{ inputs.mc_version }}-${{ github.run_id }}"

jobs:
  build-mod:
    name: "Assemble Mod JARs (${{ inputs.mc_version }})"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Setup Java 25 (Temurin)"
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: "Grant Gradle Wrapper Execute Permission"
        run: chmod +x gradlew

      - name: "Set Active Stonecutter Version"
        run: ./gradlew stonecutterSwitchTo${{ inputs.mc_version }}

      # Download all per-platform native artifacts and merge them into a single
      # directory tree, matching the prebuilt-natives layout expected by vx-native.
      - name: "Download Compiled Natives"
        uses: actions/download-artifact@v4
        with:
          pattern: "${{ inputs.natives-artifact-prefix }}-*"
          path: vx-native/prebuilt-natives
          merge-multiple: true

      # Build and collect only the configured release artifacts (e.g., fabric and neoforge jars).
      # This dynamically executes the correct remapJar tasks and copies their outputs.
      - name: "Build and Collect Mod JARs"
        run: ./gradlew collectReleaseArtifacts -x :vx-native:cmakeBuild

      - name: "Upload Assembled JARs"
        uses: actions/upload-artifact@v4
        with:
          name: "velthoric-jars-${{ inputs.mc_version }}-${{ github.run_id }}"
          path: build/release-jars/*.jar
          retention-days: ${{ inputs.retention-days }}