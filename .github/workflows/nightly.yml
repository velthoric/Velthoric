# Nightly Build Pipeline
#
# Triggered automatically on every push to the master branch, and manually via
# workflow_dispatch. This pipeline compiles natives, assembles the mod, runs the
# full GameTest suite, and publishes a rolling "nightly" pre-release on GitHub.
#
# Pipeline stages:
#   1. build-natives  - Compile vx-native for all platforms in parallel.
#   2. build-mod      - Assemble Fabric & NeoForge JARs using the compiled natives.
#   3. gametests      - Run the automated GameTest server for both loaders.
#   4. nightly        - Publish or overwrite the rolling "nightly" GitHub pre-release.

name: "Nightly Build"

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  # Call the reusable workflow to fetch the matrix dynamically
  setup-matrix:
    name: "Initialize Matrix"
    uses: ./.github/workflows/_reusable-matrix.yml

  # Stage 1: Native Libraries
  build-natives:
    name: "Stage 1 - Build Natives"
    uses: ./.github/workflows/_reusable-build-natives.yml

  # Stage 2: Mod Assembly
  build-mod:
    name: "Stage 2 - Build Mod (${{ matrix.mc_version }})"
    needs: [setup-matrix, build-natives]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    uses: ./.github/workflows/_reusable-build-mod.yml
    with:
      mc_version: ${{ matrix.mc_version }}
      java_version: ${{ matrix.java_version }}
      natives-artifact-prefix: "velthoric-natives-${{ github.run_id }}"
      retention-days: 3

  # Stage 3: Automated Tests
  gametests:
    name: "Stage 3 - GameTests (${{ matrix.mc_version }})"
    needs: [setup-matrix, build-mod]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    uses: ./.github/workflows/_reusable-gametests.yml
    with:
      mc_version: ${{ matrix.mc_version }}
      java_version: ${{ matrix.java_version }}
      natives-artifact-prefix: "velthoric-natives-${{ github.run_id }}"

  # Stage 4a: Publish Snapshots to Maven
  publish-maven:
    name: "Stage 4a - Publish Maven Snapshot (${{ matrix.mc_version }})"
    needs: [setup-matrix, gametests]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Setup Java ${{ matrix.java_version }} (Temurin)"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java_version }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: "Set Active Stonecutter Version"
        run: |
          mkdir -p .gradle/stonecutter
          echo "${{ matrix.mc_version }}" > .gradle/stonecutter/active

      - name: "Download Compiled Natives"
        uses: actions/download-artifact@v4
        with:
          pattern: "velthoric-natives-${{ github.run_id }}-*"
          path: vx-native/prebuilt-natives
          merge-multiple: true

      - name: "Grant Gradle Wrapper Execute Permission"
        run: chmod +x gradlew

      - name: "Publish Snapshot to Maven"
        run: |
          VERSION=$(grep "mod_version" gradle.properties | cut -d'=' -f2 | tr -d '\r' | xargs)
          
          # Only append -SNAPSHOT if it's not already present in mod_version
          if [[ ! "$VERSION" == *"-SNAPSHOT" ]]; then
            VERSION="${VERSION}-SNAPSHOT"
          fi
          
          ./gradlew publishVelthoric -Pvelthoric.snapshot=true -Pmod_version="${VERSION}" -x :vx-native:cmakeBuild
        env:
          MAVEN_USER: ${{ secrets.MAVEN_USER }}
          MAVEN_TOKEN: ${{ secrets.MAVEN_TOKEN }}

  # Stage 4: Nightly Release
  nightly-release:
    name: "Stage 4b - Publish Nightly Release"
    needs: gametests
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      # Download the assembled mod JARs produced in Stage 2.
      - name: "Download Assembled JARs (All Versions)"
        uses: actions/download-artifact@v4
        with:
          pattern: "velthoric-jars-*-${{ github.run_id }}"
          path: release-artifacts
          merge-multiple: true

      - name: "Setup Java 21 (Temurin)"
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: "Download Compiled Natives"
        uses: actions/download-artifact@v4
        with:
          pattern: "velthoric-natives-${{ github.run_id }}-*"
          path: vx-native/prebuilt-natives
          merge-multiple: true

      - name: "Grant Gradle Wrapper Execute Permission"
        run: chmod +x gradlew

      # Creates or overwrites the rolling "nightly" pre-release tag.
      # Every successful nightly build replaces the previous release files.
      - name: "Publish Nightly Pre-Release"
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "nightly"
          prerelease: true
          title: "Development Build (Nightly)"
          files: release-artifacts/*.jar