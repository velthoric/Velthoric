# Reusable workflow to dynamically generate the matrix using Gradle
name: "Reusable - Get Matrix"

on:
  workflow_call:
    outputs:
      matrix:
        description: "Dynamic JSON matrix of Minecraft and Java versions"
        value: ${{ jobs.matrix.outputs.matrix }}

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      # Setup Java toolchains to allow building and executing with the correct target Java versions
      - name: "Setup Java JDKs"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: |
            17
            21
            25
          cache: 'gradle'

      - name: "Grant Gradle Wrapper Execute Permission"
        run: chmod +x gradlew

      # Run the custom task and extract the JSON output safely.
      # The EOF heredoc is required because the JSON contains colons (task names
      # like :fabric:runGameTest) and brackets that confuse the simple key=value
      # format used by GITHUB_OUTPUT.
      - name: "Generate Matrix"
        id: set-matrix
        run: |
          MATRIX_JSON=$(./gradlew printStonecutterMatrix -q | grep "JSON_MATRIX:" | cut -d':' -f2- | tr -d '\r')
          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          echo "$MATRIX_JSON" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT