# Release Publish Pipeline
#
# Triggered manually via workflow_dispatch. This pipeline builds native libraries
# for all supported platforms, assembles the final mod JARs for every enabled
# Minecraft version and loader, runs the full GameTest suite, and only if all
# tests pass publishes the release to Modrinth, CurseForge, GitHub Releases,
# and the Cloudsmith Maven repository.
#
# The set of versions and loaders is read dynamically from the Stonecutter
# configuration via the printStonecutterMatrix Gradle task, so adding a new
# Stonecutter version to versions/ automatically includes it in the pipeline.
#
# Pipeline stages:
#   1. setup-matrix  - Query all Stonecutter versions and their enabled loaders.
#   2. build-natives - Compile vx-native for all host platforms in parallel.
#   3. build-mod     - Assemble mod JARs for each MC version (all loaders).
#   4. gametests     - Run the GameTest server for each loader of each MC version.
#   5. publish       - Publish to Modrinth, CurseForge, GitHub, and Maven (gated on tests).

name: "Publish Release"

on:
  workflow_dispatch:

jobs:
  # Stage 0: Dynamically build the version+loader matrix from Stonecutter config
  setup-matrix:
    name: "Initialize Matrix"
    uses: ./.github/workflows/_reusable-matrix.yml

  # Stage 1: Native Libraries
  build-natives:
    name: "Stage 1 - Build Natives"
    uses: ./.github/workflows/_reusable-build-natives.yml

  # Stage 2: Mod Assembly - one job per MC version, builds all enabled loaders
  build-mod:
    name: "Stage 2 - Build Mod (${{ matrix.mc_version }})"
    needs: [setup-matrix, build-natives]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    uses: ./.github/workflows/_reusable-build-mod.yml
    with:
      mc_version: ${{ matrix.mc_version }}
      natives-artifact-prefix: "velthoric-natives-${{ github.run_id }}"
      retention-days: 3

  # Stage 3: Automated Tests - one job per loader per MC version.
  # Publishing is blocked entirely if any GameTest fails.
  gametests:
    name: "Stage 3 - GameTests (${{ matrix.mc_version }})"
    needs: [setup-matrix, build-mod]
    strategy:
      fail-fast: true
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    uses: ./.github/workflows/_reusable-gametests.yml
    with:
      mc_version: ${{ matrix.mc_version }}
      java_version: ${{ matrix.java_version }}
      natives-artifact-prefix: "velthoric-natives-${{ github.run_id }}"
      loaders: ${{ toJson(matrix.loaders) }}

  # Stage 4: Multi-Platform Publish - one job per MC version.
  # Runs after all GameTests have passed successfully.
  # publishVelthoric automatically targets only the loaders enabled for the
  # active MC version (fabric+forge for 1.20.1, fabric+neoforge for 1.21.1, etc.)
  publish:
    name: "Stage 4 - Publish (${{ matrix.mc_version }})"
    needs: [setup-matrix, gametests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: true
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Setup Java 25 (Temurin)"
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: "Grant Gradle Wrapper Execute Permission"
        run: chmod +x gradlew

      - name: "Set Active Stonecutter Version"
        run: ./gradlew stonecutterSwitchTo${{ matrix.mc_version }}

      # Download all per-platform natives and place them in the prebuilt-natives
      # directory so the Gradle build can skip the CMake compilation step.
      - name: "Download Compiled Natives"
        uses: actions/download-artifact@v4
        with:
          pattern: "velthoric-natives-${{ github.run_id }}-*"
          path: vx-native/prebuilt-natives
          merge-multiple: true

      # Runs the full Velthoric publishing pipeline via the custom buildSrc plugin.
      # The plugin automatically configures CurseForge, Modrinth, GitHub Releases,
      # and the Cloudsmith Maven repository based on the provided credentials.
      - name: "Publish to All Platforms"
        run: ./gradlew build publishVelthoric -x :vx-native:cmakeBuild
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAVEN_USER: ${{ secrets.MAVEN_USER }}
          MAVEN_TOKEN: ${{ secrets.MAVEN_TOKEN }}