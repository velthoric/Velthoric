# Reusable workflow: GameTest Suite
#
# Downloads compiled native binaries and executes the automated GameTest server
# for every loader that is enabled for the given Minecraft version.
#
# The set of loaders to test is passed in via the loaders input as a JSON
# string produced by the printStonecutterMatrix Gradle task. This means that
# adding a new Stonecutter version or toggling a loader in gradle.properties
# automatically adjusts which tests run - no changes to this file are needed.
#
# This workflow is intended to gate downstream publish or release jobs.

name: "Reusable - GameTests"

on:
  workflow_call:
    inputs:
      mc_version:
        description: "Minecraft version target."
        type: string
        required: true
      natives-artifact-prefix:
        description: "Prefix of the native library artifacts to download."
        type: string
        required: true
      loaders:
        description: "JSON array of loader objects ({loader, task}) to test against."
        type: string
        required: true

jobs:
  run-gametests:
    name: "GameTest - ${{ matrix.loader }} (${{ inputs.mc_version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include: ${{ fromJson(inputs.loaders) }}

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      # Setup Java toolchains to allow building and executing with the correct target Java versions
      - name: "Setup Java JDKs"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: |
            17
            21
            25
          cache: 'gradle'

      - name: "Grant Gradle Wrapper Execute Permission"
        run: chmod +x gradlew

      - name: "Set Active Stonecutter Version"
        run: ./gradlew stonecutterSwitchTo${{ inputs.mc_version }}

      # Native binaries must be present before Gradle configures the project,
      # as the vx-native module resolves them at configuration time.
      - name: "Download Compiled Natives"
        uses: actions/download-artifact@v4
        with:
          pattern: "${{ inputs.natives-artifact-prefix }}-*"
          path: vx-native/prebuilt-natives
          merge-multiple: true

      - name: "Run GameTest Server"
        run: ./gradlew ${{ matrix.task }} -x :vx-native:cmakeBuild